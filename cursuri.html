<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPERCLASS - Cursuri</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .pulse-soft {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body class="bg-amber-50/40 text-slate-800 font-sans selection:bg-amber-200 overflow-x-hidden">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-amber-100 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4">

            <div class="flex justify-between items-center">

                <!-- Logo -->
                <a href="index.html"
                    class="text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:scale-105 transition">
                    SUPERCLASS
                </a>

                <!-- Desktop Menu -->
                <div class="hidden md:flex space-x-6 font-bold text-sm tracking-wide uppercase">
                    <a href="index.html" class="text-violet-600 border-b-4 border-violet-500 pb-1">Acasă</a>
                    <a href="cursuri.html" class="text-slate-600 hover:text-violet-600 transition">Cursuri</a>
                    <a href="contact.html" class="text-slate-600 hover:text-violet-600 transition">Contact</a>
                </div>

                <!-- Hamburger Button -->
                <button id="menu-btn" class="md:hidden text-slate-700 focus:outline-none">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

            </div>

            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden md:hidden mt-4 flex flex-col space-y-4 font-bold uppercase text-sm">
                <a href="index.html" class="text-violet-600">Acasă</a>
                <a href="cursuri.html" class="text-slate-600 hover:text-violet-600">Cursuri</a>
                <a href="contact.html" class="text-slate-600 hover:text-violet-600">Contact</a>
            </div>

        </div>
    </nav>

    <script>
        const menuBtn = document.getElementById("menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");

        menuBtn.addEventListener("click", () => {
            mobileMenu.classList.toggle("hidden");
        });
    </script>

    <header class="bg-slate-900 text-white py-16 px-6 text-center rounded-b-[2rem] shadow-lg animate__animated animate__fadeInDown">
        <span class="inline-block bg-slate-800 border border-slate-700 text-amber-400 font-black tracking-widest uppercase text-xs px-3 py-1 rounded-full pulse-soft">Alege-ți aventura 🎒</span>
        <h1 class="text-3xl md:text-5xl font-black tracking-tight mt-4 text-white">Cursuri care chiar te ajută</h1>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-16">
        <div class="grid md:grid-cols-2 gap-8">
            
            <div class="animate__animated animate__zoomIn bg-white rounded-3xl shadow-md border-2 border-slate-100 overflow-hidden flex flex-col hover:shadow-2xl hover:-translate-y-3 transition transform duration-300 group">
                <div class="bg-gradient-to-br from-cyan-400 to-blue-500 h-44 flex items-center justify-center text-6xl select-none group-hover:scale-110 transition transform duration-300">🇬🇧</div>
                <div class="p-8 flex-grow flex flex-col justify-between">
                    <div>
                        <h3 class="text-2xl font-black mt-3 mb-2 text-slate-900">Cursuri Limba Engleză</h3>
                        <p class="text-slate-600 font-medium text-sm leading-relaxed mb-6"></p>
                    </div>
                    <div class="pt-6 border-t border-slate-100 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Preț</p>
                            <span class="text-xl font-black text-slate-900">-</span>
                        </div>
                        <a href="contact.html" class="bg-slate-900 text-white font-bold text-sm px-5 py-2.5 rounded-full hover:bg-blue-500 hover:scale-110 active:scale-95 transition transform duration-200 shadow-md">Rezervă loc</a>
                    </div>
                </div>
            </div>

            <div class="animate__animated animate__zoomIn bg-white rounded-3xl shadow-md border-2 border-slate-100 overflow-hidden flex flex-col hover:shadow-2xl hover:-translate-y-3 transition transform duration-300 group" style="animation-delay: 0.1s;">
                <div class="bg-gradient-to-br from-amber-400 to-orange-500 h-44 flex items-center justify-center text-6xl select-none group-hover:scale-110 transition transform duration-300">🇫🇷</div>
                <div class="p-8 flex-grow flex flex-col justify-between">
                    <div>
                        <h3 class="text-2xl font-black mt-3 mb-2 text-slate-900">Cursuri Limba Franceză</h3>
                    </div>
                    <div class="pt-6 border-t border-slate-100 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Preț</p>
                            <span class="text-xl font-black text-slate-900">-</span>
                        </div>
                        <a href="contact.html" class="bg-slate-900 text-white font-bold text-sm px-5 py-2.5 rounded-full hover:bg-orange-500 hover:scale-110 active:scale-95 transition transform duration-200 shadow-md">Rezervă loc</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-950 text-slate-400 py-12 text-center rounded-t-[2.5rem]">
        <p class="font-bold text-white mb-2">⚡ SUPERCLASS™ 2026</p>
        <p class="text-sm text-slate-500">Toate drepturile rezervate.</p>
    </footer>

</body>
</html>
